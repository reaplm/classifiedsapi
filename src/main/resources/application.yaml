
spring:
  application:
    name: classifiedsapi
  datasource:
    # url: jdbc:mysql://localhost:port/db
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      properties:
      hibernate:
         dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: user
      password: springuser
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

springdoc:
  # Specify the path of the OpenAPI documentation
  api-docs:
    path: /api-docs
  swagger-ui:
    # Specify the path of Swagger UI
    path: /swagger-ui.html
    # Enable or disable Swagger UI
    enable: true

logging:
   level:
     org.hibernate.SQL: DEBUG         # Prints the exact SQL query to the terminal
     org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Prints the input parameters
